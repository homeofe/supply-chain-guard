# GitLab CI job template for supply-chain-guard.
# Merge into your .gitlab-ci.yml (or include it as a template).
#
# The job installs the CLI, scans the repository with JSON output, fails
# the pipeline on high or critical findings, and always uploads the report
# as a job artifact (even when the scan fails).

supply_chain_scan:
  image: node:20
  stage: test
  script:
    - npm install -g supply-chain-guard
    - supply-chain-guard scan . --format json --fail-on high > scg-report.json
  artifacts:
    when: always
    paths:
      - scg-report.json
    expire_in: 30 days
