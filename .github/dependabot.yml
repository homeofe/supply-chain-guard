version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # commander 15+ is ESM-only (no CommonJS "require" export) and requires
      # Node >=22.12. This package ships as a CommonJS CLI + require()-able
      # library with engines node >=20, so it stays on the commander 14.x (CJS)
      # line until a deliberate ESM migration. See PR #39.
      - dependency-name: "commander"
        versions: [">=15"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  # Keeps the digest-pinned node:20-alpine base image in the Dockerfile fresh:
  # the FROM lines pin by sha256 digest, so security updates only arrive via
  # these deliberate weekly bump PRs.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    ignore:
      # The Node base image stays on the deliberately chosen LTS major (bumped
      # by hand). Dependabot brings digest / patch / minor refreshes only, not
      # major jumps: PR #49 proposed node 20 -> 26-alpine (premature, barely
      # LTS) for a security tool's own image. See CHANGELOG v5.6.1.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
