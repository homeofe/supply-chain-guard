# Renders the README demo GIF from assets/demo.tape using VHS.
#
# Manual trigger only. The GIF is uploaded as a workflow ARTIFACT, not
# committed by the bot: a bot push to main would change files outside
# .ai/handoff/ without STATUS.md + MANIFEST.json and fail the AAHP Verify
# gate. Download the artifact and commit it through the normal gated flow:
#   gh run download <run-id> --name demo-gif --dir assets/
name: Render Demo GIF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: Render demo.gif with VHS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build and link the CLI from this checkout
        run: |
          npm ci
          npm run build
          npm link

      - name: Stage the demo target (malicious test fixture)
        run: cp -r src/__tests__/fixtures/malicious-npm-pkg ./suspicious-package

      - name: Render the tape
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3 # v2.1.0
        with:
          path: assets/demo.tape

      - name: Upload the GIF as an artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: demo-gif
          path: assets/demo.gif
          retention-days: 7
