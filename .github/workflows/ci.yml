name: CI

on:
  push:
    branches: [main]
    tags:
      # Full semver only (v5.2.35). The floating major ref `v5` is a BRANCH,
      # not a tag - matching `v*` here would let the major tag (if one ever
      # appears) trigger publish and try to re-publish an existing version.
      # See the v5.2.35 incident: a stray `v5` tag triggered a failed publish.
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v5.0.0)'
        required: false

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # AAHP conformance (v3.6+): the pinned @elvatis_com/aahp CLI self-checks handoff
      # set, MANIFEST schema, grounding, the exact-version dep pin, changelog format and
      # version sync. --no-install forces the pinned node_modules copy, not a fetched one.
      - name: AAHP conformance
        run: npx --no-install aahp doctor . --json

      - name: Test
        run: npm run test:coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 14

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    # Full semver tag (contains a dot) or manual dispatch. A major-only ref
    # like refs/tags/v5 has no dot and must never reach publish.
    if: (startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1. Node 20
      # LTS bundles npm 10.x, which silently falls back to classic
      # token auth even when id-token: write is granted. Upgrade
      # explicitly so OIDC kicks in.
      # Pin to the 11.x line: npm@latest is now npm 12, which requires
      # Node >=22 and hard-fails EBADENGINE on this Node 20 runner (broke
      # the v5.11.0 publish on 2026-07-09). npm 11.x is OIDC-capable AND
      # Node-20-compatible. Bump this (and node-version) together if the
      # publish runner ever moves to Node 22+.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11

      # Auth happens via OIDC against the npmjs Trusted Publisher
      # configured for this package + this workflow. No NPM_TOKEN
      # secret is used or needed.
      - name: Publish to npm
        run: npm publish --access public --provenance

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md (moved out of
          # README.md in v5.2.45 to keep the landing page readable).
          # NOT an awk range pattern: /start/,/end/ terminates on the SAME line
          # when the heading matches both expressions, which yielded one line,
          # then head -n -1 emptied it - every release before v5.2.45 silently
          # shipped the fallback text. Flag-based scan fixed it.
          # Literal prefix match via index() - avoids awk-variant differences in how
          # "\\[" inside a string-regex is handled (gawk collapses it to a char class).
          NOTES=$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 {flag=1; print; next}
            flag && index($0, "## [") == 1 {exit}
            flag {print}
          ' CHANGELOG.md)
          # Fallback if nothing found
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full changelog."
          fi
          # Write to file to preserve multiline
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "supply-chain-guard $GITHUB_REF_NAME" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-major-branch:
    name: Update major version branch
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Floating major-version branch so `uses: homeofe/supply-chain-guard@v5`
      # always resolves to the latest v5.x.y release. This is a BRANCH, not a
      # tag - branches are meant to move, so this fast-forward push does not
      # violate the "never move tags" rule. Each release commit descends from
      # the previous one on main, so this is always a fast-forward (no --force).
      - name: Fast-forward the major-version branch to this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # 5.2.34
          MAJOR="v${VERSION%%.*}"          # v5
          git push origin "HEAD:refs/heads/${MAJOR}"
