name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v5.0.0)'
        required: false

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1. Node 20
      # LTS bundles npm 10.x, which silently falls back to classic
      # token auth even when id-token: write is granted. Upgrade
      # explicitly so OIDC kicks in.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # Auth happens via OIDC against the npmjs Trusted Publisher
      # configured for this package + this workflow. No NPM_TOKEN
      # secret is used or needed.
      - name: Publish to npm
        run: npm publish --access public --provenance

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from README.md
          NOTES=$(awk "/^### v${VERSION}/,/^### v[0-9]/" README.md | head -n -1)
          # Fallback if nothing found
          if [ -z "$NOTES" ]; then
            NOTES="See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md#changelog) for full changelog."
          fi
          # Write to file to preserve multiline
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "supply-chain-guard $GITHUB_REF_NAME" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-major-branch:
    name: Update major version branch
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Floating major-version branch so `uses: homeofe/supply-chain-guard@v5`
      # always resolves to the latest v5.x.y release. This is a BRANCH, not a
      # tag - branches are meant to move, so this fast-forward push does not
      # violate the "never move tags" rule. Each release commit descends from
      # the previous one on main, so this is always a fast-forward (no --force).
      - name: Fast-forward the major-version branch to this release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # 5.2.34
          MAJOR="v${VERSION%%.*}"          # v5
          git push origin "HEAD:refs/heads/${MAJOR}"
