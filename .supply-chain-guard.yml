# supply-chain-guard policy for this repository's own self-scan.
#
# Each suppression below is a reviewed, accepted by-design tradeoff - not a
# hidden finding. The reasons are the audit trail: anyone can read why these
# are considered acceptable. Nothing here disables detection for users who
# scan their own projects; this file only applies when scanning THIS repo.

suppress:
  # The publish job needs an OIDC permission to authenticate to npm via
  # Trusted Publishing (no long-lived token). The job runs no third-party
  # actions and pins checkout and setup-node to immutable commit SHAs, so
  # there is no step that could exfiltrate the OIDC token.
  - rule: GHA_OIDC_WRITE_PERM
    reason: OIDC permission required for npm Trusted Publishing; publish job has no third-party actions and all actions are pinned to commit SHAs

  # The release job uses the built-in GitHub token only to create a GitHub
  # Release through the gh CLI. No secret is sent to any external endpoint.
  - rule: WORKFLOW_SECRET_TO_UPLOAD_PATH
    reason: built-in GitHub token used only by the release job to publish a GitHub Release via the gh CLI; no secret leaves the workflow

  # npm v7+ lockfiles list every transitive dependency at the root
  # node_modules level by design. These are not orphaned packages and the
  # finding is informational only.
  - rule: LOCKFILE_ORPHANED_DEPENDENCY
    reason: transitive dependencies at lockfile root per npm v7+ flat-install format; not orphans, informational only
