# Hook definition for the pre-commit framework (https://pre-commit.com).
#
# Usage in a consuming repository's .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/homeofe/supply-chain-guard
#       rev: v5.5.0
#       hooks:
#         - id: supply-chain-guard
#
# pre-commit installs this repository as an npm package; the "prepare"
# script in package.json compiles dist/ so the CLI binary is available.

- id: supply-chain-guard
  name: supply-chain-guard scan
  description: Scan the repository for supply-chain malware indicators (fails on high or critical findings)
  language: node
  entry: supply-chain-guard scan . --fail-on high
  pass_filenames: false
  always_run: true
